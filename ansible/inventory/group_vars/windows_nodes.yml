---
ansible_connection: winrm
ansible_winrm_transport: ntlm
ansible_winrm_server_cert_validation: ignore
ansible_winrm_port: 5985

# svc-ansible must exist on the Windows host with appropriate privileges.
# Password stored in ansible vault: vault_windows_ansible_password
ansible_user: VMSTATION\ansible_svc
ansible_password: "{{ vault_windows_ansible_password }}"
