---
# k8s-apply.yml — Apply all Kustomize manifests to the cluster
# Runs kubectl apply -k for each app directory in kustomize/.
# Must be run on masternode (has kubeconfig at /etc/kubernetes/admin.conf).
#
# Usage:
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/k8s-apply.yml
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/k8s-apply.yml --tags cert-manager
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/k8s-apply.yml --tags ingress
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/k8s-apply.yml --tags jellyfin
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/k8s-apply.yml --tags monitoring
#
# First-time setup order:
#   1. ansible-playbook k8s-certs.yml   (DNS + Cloudflare secret)
#   2. ansible-playbook k8s-apply.yml   (installs cert-manager, then all apps)

- name: Apply Kubernetes manifests via Kustomize
  hosts: control_plane
  become: false
  gather_facts: false

  vars:
    kubeconfig: /home/jjbly/.kube/config
    repo_root: "{{ playbook_dir }}/../.."

  tasks:
    - name: Create local PV directories on masternode
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /var/lib/vaultwarden
        - /srv/monitoring_data/prometheus
        - /srv/monitoring_data/grafana
        - /srv/monitoring_data/loki
      tags: [always]

    - name: Create local PV directories on storagenodet3500
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /var/lib/jellyfin/config
        - /var/lib/jellyfin/cache
        - /var/lib/k8s/nextcloud
        - /var/lib/k8s/mariadb
      delegate_to: storagenodet3500
      ignore_unreachable: true
      tags: [always]

    - name: Install cert-manager from official release
      ansible.builtin.shell: |
        kubectl --kubeconfig={{ kubeconfig }} apply -f \
          https://github.com/cert-manager/cert-manager/releases/download/v1.16.3/cert-manager.yaml
      changed_when: true
      tags: [cert-manager]

    - name: Wait for cert-manager webhook to be ready
      ansible.builtin.shell: |
        kubectl --kubeconfig={{ kubeconfig }} wait \
          --for=condition=Available deployment/cert-manager-webhook \
          -n cert-manager --timeout=120s
      changed_when: false
      tags: [cert-manager]

    - name: Apply ClusterIssuer (Let's Encrypt + Cloudflare)
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/cert-manager
      changed_when: true
      tags: [cert-manager]

    - name: Apply nginx ingress controller
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/ingress
      changed_when: true
      tags: [ingress]

    - name: Apply monitoring stack
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/monitoring
      changed_when: true
      tags: [monitoring]

    - name: Apply Jellyfin
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/jellyfin
      changed_when: true
      tags: [jellyfin]

    - name: Apply Nextcloud
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/nextcloud
      changed_when: true
      tags: [nextcloud]

    - name: Apply Vaultwarden
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/vaultwarden
      changed_when: true
      tags: [vaultwarden]

    - name: Apply Homer dashboard
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/homer
      changed_when: true
      tags: [homer]

    - name: Apply nodectl (WoL + shutdown API)
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} apply -k {{ repo_root }}/kustomize/nodectl
      changed_when: true
      tags: [nodectl]

    - name: Show pod status
      ansible.builtin.command:
        cmd: kubectl --kubeconfig={{ kubeconfig }} get pods -A
      changed_when: false
      register: pod_status
      tags: [status]

    - name: Display pod status
      ansible.builtin.debug:
        msg: "{{ pod_status.stdout_lines }}"
      tags: [status]


