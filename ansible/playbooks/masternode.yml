---
# masternode.yml — masternode-only services
# Configures: BIND9 as secondary DNS (forwards to AD DC), rsyslog as syslog receiver, node_exporter.
# Run on: control_plane (masternode only)
#
# Usage:
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/masternode.yml

- name: Configure masternode-specific services
  hosts: control_plane
  become: true
  gather_facts: true

  vars:
    ad_dc_ip: "192.168.4.62"
    syslog_port: 514
    node_exporter_version: "1.7.0"
    node_exporter_install_dir: /opt/node_exporter

  handlers:
    - name: restart bind9
      ansible.builtin.service:
        name: named
        state: restarted

    - name: restart rsyslog
      ansible.builtin.service:
        name: rsyslog
        state: restarted

  tasks:
    # --- BIND9 secondary DNS ---
    - name: Install BIND9
      ansible.builtin.apt:
        name:
          - bind9
          - bind9utils
          - bind9-doc
        state: present
        update_cache: true
      tags: [dns]

    - name: Configure BIND9 as forwarding resolver
      ansible.builtin.copy:
        dest: /etc/bind/named.conf.options
        mode: '0644'
        content: |
          // Managed by Ansible - do not edit directly
          options {
              directory "/var/cache/bind";

              // Forward all queries to AD DC (primary DNS)
              forwarders {
                  {{ ad_dc_ip }};
                  8.8.8.8;
              };
              forward only;

              dnssec-validation no;
              listen-on { any; };
              listen-on-v6 { any; };
              allow-query { any; };
              recursion yes;
          };
      notify: restart bind9
      tags: [dns]

    - name: Enable and start BIND9
      ansible.builtin.service:
        name: named
        state: started
        enabled: true
      tags: [dns]

    # --- rsyslog centralized receiver ---
    - name: Install rsyslog
      ansible.builtin.apt:
        name: rsyslog
        state: present
      tags: [syslog]

    - name: Configure rsyslog as syslog server
      ansible.builtin.copy:
        dest: /etc/rsyslog.d/10-server.conf
        mode: '0644'
        content: |
          # Managed by Ansible - do not edit directly
          module(load="imudp")
          input(type="imudp" port="{{ syslog_port }}")
          module(load="imtcp")
          input(type="imtcp" port="{{ syslog_port }}")

          # Store remote logs by hostname
          template(name="RemoteLogs" type="string"
                   string="/var/log/remote/%HOSTNAME%/%PROGRAMNAME%.log")
          if $fromhost-ip != "127.0.0.1" then ?RemoteLogs
          & stop
      notify: restart rsyslog
      tags: [syslog]

    - name: Create remote log directory
      ansible.builtin.file:
        path: /var/log/remote
        state: directory
        owner: root
        group: adm
        mode: '0750'
      tags: [syslog]

    - name: Configure logrotate for remote syslog
      ansible.builtin.copy:
        dest: /etc/logrotate.d/rsyslog-remote
        mode: '0644'
        content: |
          /var/log/remote/*/*.log {
              daily
              missingok
              rotate 90
              compress
              delaycompress
              notifempty
              create 0640 root adm
              sharedscripts
              postrotate
                  /usr/lib/rsyslog/rsyslog-rotate
              endscript
          }
      tags: [syslog]

    - name: Enable and start rsyslog
      ansible.builtin.service:
        name: rsyslog
        state: started
        enabled: true
      tags: [syslog]

    # --- node_exporter ---
    - name: Create node_exporter install directory
      ansible.builtin.file:
        path: "{{ node_exporter_install_dir }}"
        state: directory
        mode: '0755'
      tags: [node-exporter]

    - name: Download node_exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
        mode: '0644'
      tags: [node-exporter]

    - name: Extract node_exporter
      ansible.builtin.unarchive:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.tar.gz"
        dest: "{{ node_exporter_install_dir }}"
        remote_src: true
        extra_opts: ['--strip-components=1']
        creates: "{{ node_exporter_install_dir }}/node_exporter"
      tags: [node-exporter]

    - name: Install node_exporter systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: '0644'
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=root
          ExecStart={{ node_exporter_install_dir }}/node_exporter
          Restart=always

          [Install]
          WantedBy=multi-user.target
      tags: [node-exporter]

    - name: Enable and start node_exporter
      ansible.builtin.systemd:
        name: node_exporter
        state: started
        enabled: true
        daemon_reload: true
      tags: [node-exporter]
