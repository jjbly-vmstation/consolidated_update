---
# bootstrap.yml — Debian node baseline setup
# Configures: NTP (pointing to AD DC), swap off, kernel params, containerd, kubeadm packages, WoL.
# Run on: linux_nodes (masternode + storagenodet3500)
#
# Usage:
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/bootstrap.yml

- name: Bootstrap Debian cluster nodes
  hosts: linux_nodes
  become: true
  gather_facts: true

  vars:
    chrony_config_path: /etc/chrony/chrony.conf
    k8s_apt_key_url: https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key
    k8s_apt_repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
    containerd_config_path: /etc/containerd/config.toml

  handlers:
    - name: restart chrony
      ansible.builtin.service:
        name: chrony
        state: restarted

    - name: restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted

    - name: apply sysctl
      ansible.builtin.command: sysctl --system
      changed_when: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [packages]

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - jq
          - vim
          - htop
          - net-tools
          - ca-certificates
          - gnupg
          - lsb-release
          - python3
          - python3-pip
          - chrony
          - ethtool
        state: present
      tags: [packages]

    - name: Configure chrony to use AD DC as NTP source
      ansible.builtin.template:
        dest: "{{ chrony_config_path | default('/etc/chrony.conf') }}"
        owner: root
        group: root
        mode: '0644'
        # Use a separate .j2 file or use the 'content' key with a lookup
        content: |
          # Managed by Ansible - do not edit directly
          {% for server in ntp_servers %}
          server {{ server }} iburst
          {% endfor %}
          driftfile /var/lib/chrony/drift
          makestep 1.0 3
          rtcsync
          logdir /var/log/chrony
      register: chrony_config_result
      tags: [ntp]

    - name: Enable and start chrony
      ansible.builtin.service:
        name: chrony
        state: started
        enabled: true
      tags: [ntp]

    - name: Disable swap now
      ansible.builtin.command: swapoff -a
      changed_when: false
      tags: [swap]

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'
      tags: [swap]

    - name: Load required kernel modules
      community.general.modprobe:
        name: "{{ item }}"
        state: present
      loop: "{{ k8s_kernel_modules }}"
      tags: [kernel]

    - name: Persist kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/kubernetes.conf
        content: |
          br_netfilter
          overlay
        mode: '0644'
      tags: [kernel]

    - name: Apply Kubernetes sysctl settings
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.d/99-kubernetes.conf
        reload: true
      loop: "{{ k8s_sysctl | dict2items }}"
      notify: apply sysctl
      tags: [sysctl]

    - name: Install containerd apt prereqs
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - software-properties-common
        state: present
      tags: [containerd]

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
      tags: [containerd]

    - name: Add Docker apt repo for containerd
      ansible.builtin.shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/debian $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
          > /etc/apt/sources.list.d/docker.list
        apt-get update
      args:
        creates: /etc/apt/sources.list.d/docker.list
      tags: [containerd]

    - name: Install containerd
      ansible.builtin.apt:
        name: containerd.io
        state: present
        update_cache: true
      tags: [containerd]

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml
      tags: [containerd]

    - name: Set systemd cgroup driver in containerd config
      ansible.builtin.replace:
        path: "{{ containerd_config_path }}"
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd
      tags: [containerd]

    - name: Enable and start containerd
      ansible.builtin.service:
        name: containerd
        state: started
        enabled: true
      tags: [containerd]

    - name: Add Kubernetes apt key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL {{ k8s_apt_key_url }} | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      tags: [k8s-packages]

    - name: Add Kubernetes apt repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "{{ k8s_apt_repo }}\n"
        mode: '0644'
      tags: [k8s-packages]

    - name: Install kubelet, kubeadm, kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true
      tags: [k8s-packages]

    - name: Hold kubelet kubeadm kubectl at current version
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
      tags: [k8s-packages]

    - name: Install ethtool for Wake-on-LAN
      ansible.builtin.apt:
        name: ethtool
        state: present
      tags: [wol]

    - name: Enable Wake-on-LAN on primary interface
      ansible.builtin.shell: |
        iface=$(ip route get 192.168.4.1 | awk '{for(i=1;i<=NF;i++) if ($i=="dev") print $(i+1)}' | head -1)
        ethtool -s "$iface" wol g || true
      changed_when: false
      tags: [wol]
