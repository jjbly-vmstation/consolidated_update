apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homer
  labels:
    app: homepage
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: copy-config
          image: busybox:latest
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              cp /config-src/* /app/config/
              chown -R 1000:1000 /app/config/
          volumeMounts:
            - name: config-src
              mountPath: /config-src
            - name: config-dir
              mountPath: /app/config
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "*"
          volumeMounts:
            - name: config-dir
              mountPath: /app/config
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config-src
          configMap:
            name: homepage-config
        - name: config-dir
          emptyDir: {}
