apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homer
data:
  settings.yaml: |
    title: jjbly homelab
    theme: dark
    color: slate
    headerStyle: boxed
    hideVersion: true
    layout:
      Media:
        icon: mdi-play-circle
        style: row
        columns: 4
      Productivity:
        icon: mdi-cloud-outline
        style: row
        columns: 4
      Monitoring:
        icon: mdi-chart-line
        style: row
        columns: 4

  services.yaml: |
    - Media:
        - Jellyfin:
            href: https://jellyfin.jjbly.uk
            description: Movies, TV & Music
            icon: jellyfin.png

    - Productivity:
        - Nextcloud:
            href: https://nextcloud.jjbly.uk
            description: Files & Sync
            icon: nextcloud.png
        - Vaultwarden:
            href: https://vault.jjbly.uk
            description: Password Manager
            icon: vaultwarden.png

    - Monitoring:
        - Grafana:
            href: https://grafana.jjbly.uk
            description: Dashboards & Alerts
            icon: grafana.png
        - Prometheus:
            href: https://prometheus.jjbly.uk
            description: Metrics
            icon: prometheus.png

  widgets.yaml: |
    - resources:
        cpu: true
        memory: true
        label: Cluster Resources

    - search:
        provider: google
        target: _blank
        focus: false

  bookmarks.yaml: |
    []

  docker.yaml: |
    {}
