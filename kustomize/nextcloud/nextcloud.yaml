---
# SSL from AD DC not yet implemented — see docs/NEXTCLOUD_SSL.md
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
        app.kubernetes.io/name: nextcloud
        app.kubernetes.io/component: app
    spec:
      nodeSelector:
        vmstation/role: storage
      initContainers:
        - name: prep-data-dir
          image: alpine:3.19
          command:
            - sh
            - -c
            - mkdir -p /var/www/html/data && chown -R 33:33 /var/www/html/data && [ ! -f /var/www/html/data/.ocdata ] && touch /var/www/html/data/.ocdata || true
          volumeMounts:
            - name: nextcloud-html
              mountPath: /var/www/html
            - name: family-files
              mountPath: /var/www/html/data
      containers:
        - name: nextcloud
          image: nextcloud:29-apache
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: MYSQL_HOST
              value: mariadb.nextcloud.svc.cluster.local
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: db-name
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: db-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: db-password
            - name: NEXTCLOUD_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: admin-user
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: admin-password
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: trusted-domains
            - name: OVERWRITEPROTOCOL
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: overwriteprotocol
            - name: OVERWRITEHOST
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: overwritehost
            - name: OVERWRITECLIURL
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: overwritecliurl
          volumeMounts:
            - name: nextcloud-html
              mountPath: /var/www/html
            - name: family-files
              mountPath: /var/www/html/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1.5Gi"
      volumes:
        - name: nextcloud-html
          persistentVolumeClaim:
            claimName: nextcloud-html-pvc
        - name: family-files
          hostPath:
            path: /mnt/media/family-files
            type: DirectoryOrCreate
