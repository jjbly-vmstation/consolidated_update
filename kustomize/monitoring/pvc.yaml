---
# PVC for Prometheus StatefulSet (name must match volumeClaimTemplate: prometheus-storage-prometheus-0)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage-prometheus-0
  namespace: monitoring
spec:
  storageClassName: manual
  volumeName: pv-prometheus
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 25Gi
---
# PVC for Loki StatefulSet (name must match volumeClaimTemplate: loki-data-loki-0)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data-loki-0
  namespace: monitoring
spec:
  storageClassName: manual
  volumeName: pv-loki
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
---
# PVC for Grafana Deployment
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
  labels:
    app: grafana
spec:
  storageClassName: manual
  volumeName: pv-grafana
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
