---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  labels:
    app: grafana
    app.kubernetes.io/name: grafana
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.vmstation.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  labels:
    app: prometheus
    app.kubernetes.io/name: prometheus
spec:
  ingressClassName: nginx
  rules:
    - host: prometheus.vmstation.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-http
                port:
                  number: 9090
